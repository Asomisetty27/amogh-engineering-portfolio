<svg viewBox="0 0 600 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gold gradient for premium effect -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C547;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>

    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background with subtle border -->
  <rect x="8" y="8" width="584" height="124" rx="32" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="3"/>

  <!-- Decorative accent bars -->
  <rect x="8" y="8" width="584" height="3" rx="32" fill="url(#goldGrad)" opacity="0.6"/>

  <!-- Speech bubble tail -->
  <polygon points="55,132 90,132 72.5,147" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="3"/>

  <!-- Premium R_theta icon (larger, bolder) -->
  <g transform="translate(465, 40)" filter="url(#glow)">
    <!-- Outer circle border -->
    <circle cx="25" cy="25" r="32" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.4"/>

    <!-- Thermal resistance curve (isotherm shape) - bolder -->
    <path d="M 10 25 Q 25 5, 40 20 Q 50 35, 40 50 Q 25 50, 10 25"
          fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Center theta symbol -->
    <circle cx="25" cy="25" r="4" fill="url(#goldGrad)"/>

    <!-- Glow circle -->
    <circle cx="25" cy="25" r="28" fill="none" stroke="url(#goldGrad)" stroke-width="0.5" opacity="0.2"/>
  </g>

  <!-- Text content - premium styling -->
  <text x="48" y="54" font-family="'Space Grotesk', sans-serif" font-size="32" font-weight="800" fill="url(#goldGrad)" letter-spacing="1.2" text-anchor="start">THETA</text>

  <text x="48" y="76" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#cccccc" letter-spacing="0.5" text-anchor="start">GPU THERMAL FORENSICS</text>

  <text x="48" y="98" font-family="'Inter', sans-serif" font-size="13" font-weight="500" fill="#999999" letter-spacing="0.3" text-anchor="start">runtheta.com</text>

  <!-- Accent line underneath -->
  <line x1="48" y1="105" x2="200" y2="105" stroke="url(#goldGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>

  <!-- Corner accent -->
  <circle cx="550" cy="25" r="6" fill="url(#goldGrad)" opacity="0.6"/>
</svg>